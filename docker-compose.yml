services:
  db:
    image: postgres:16-alpine
    container_name: bombino_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bombino}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bombino_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bombino}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bombino} -d ${POSTGRES_DB:-bombino}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: bombino_bot
    env_file: .env
    environment:
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-bombino}:${POSTGRES_PASSWORD:-bombino_secret}@db:5432/${POSTGRES_DB:-bambino}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 3g  # EasyOCR + PyTorch need enough RAM so container isn't OOM-killed

volumes:
  postgres_data:
